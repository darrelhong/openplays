- description: Senja weekend multi-listing expansion
  vars:
    senderName: Test Sender 1
    referenceDate: '2026-04-08'
    expected: file://tests/extractor/fixtures/senja-weekend-multi-listing.json
    block: |
      Hi, looking for doubles players on:

      1) 09/04 Thursday 7pm-9pm - 4 courts (HB - MI)

      2) 11/04 Saturday 3pm-5pm - 3 courts (HB - MI)

      3) 12/04 Sunday 1pm-3pm - 3 courts (HB - MI)

      4) 12/04 Sunday 3pm-5pm - 4.5 courts (LI - HI)

      !Game fee for 👸🏼(F) is $2 lower for weekend games

      Venue
      Senja-Cashew Sports Hall (5 mins walk from Bukit Panjang MRT Station)

      Shuttlecock
      RSL Ultimate Shuttlecock

      Pm or Whatsapp 90058266 if keen 🙏

      Thank you
  threshold: 0.8
  assertScoringFunction: file://configs/assertions/extractor-scoring.js:extractorScoring
  assert:
    - type: javascript
      metric: count
      value: file://configs/assertions/extractor-assertions.js:listingCountMatches
    - type: javascript
      metric: structure
      value: file://configs/assertions/extractor-assertions.js:structureMatches
    - type: javascript
      metric: courts
      value: file://configs/assertions/extractor-assertions.js:courtsMatch
    - type: javascript
      metric: fees
      value: file://configs/assertions/extractor-assertions.js:feesMatch
    - type: javascript
      metric: contacts
      value: file://configs/assertions/extractor-assertions.js:contactsMatch
    - type: javascript
      metric: normalization
      value: file://configs/assertions/extractor-assertions.js:normalizationMatches

