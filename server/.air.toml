root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/api"
  cmd = "go build -o ./tmp/api ./cmd/api"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules", "web"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql", "yaml"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
